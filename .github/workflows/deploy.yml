name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            port: 3000
          - app: menu
            port: 3001
          - app: admin
            port: 3002
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} image
        run: |
          docker build \
            --file Dockerfile \
            --build-arg APP=${{ matrix.app }} \
            --build-arg PORT=${{ matrix.port }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY} \
            --build-arg SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY} \
            --tag bite-${{ matrix.app }}:${{ github.sha }} \
            .

  deploy:
    name: Deploy Bite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-images

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 25m
          envs: SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY
          script: |
            set -euo pipefail
            : "${SUPABASE_URL:?Missing SUPABASE_URL secret}"
            : "${SUPABASE_ANON_KEY:?Missing SUPABASE_ANON_KEY secret}"
            : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"
            export SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
            cd /root/bite
            echo "Pulling latest changes..."
            git pull --ff-only origin main
            echo "Rebuilding containers..."
            DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1 docker compose build --parallel
            docker compose up -d --remove-orphans
            echo "Cleaning up old images..."
            docker image prune -f
            echo "Deploy complete. Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
